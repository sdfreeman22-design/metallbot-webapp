services:
  - type: web
    name: metallbot-webapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false
      # ВАЖНО (безопасность): без TELEGRAM_TOKEN require_manager пропускает правку/
      # удаление карточек БЕЗ авторизации (fail-open). Значение задать в дашборде Render.
      - key: TELEGRAM_TOKEN
        sync: false
      # ID Telegram (через запятую), кому разрешена правка/удаление базы (админы+
      # менеджеры). На Render users.json нет → это основной источник прав.
      - key: ALLOWED_IDS
        sync: false
