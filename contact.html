<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>METALLBOT</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;
  --ink:#f0f0f0;--ink2:#aaa;--ink3:#666;
  --accent:#e8c96d;--good:#5ec27a;--warn:#d4a72c;--bad:#d96565;
  --border:#2a2a2a;--r:14px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,sans-serif;font-size:15px;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
.hdr{padding:12px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr h1{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.hdr small{font-size:12px;color:var(--ink3)}

/* ── Search ── */
.search-wrap{padding:10px 16px 0;flex-shrink:0}
.search-wrap input{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;color:var(--ink);font-size:15px;outline:none;
}
.search-wrap input::placeholder{color:var(--ink3)}

/* ── Filters ── */
.filters{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg3);color:var(--ink2);font-size:13px;cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.chip.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:600}

/* ── List ── */
#list{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch}
.card{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);cursor:pointer;
}
.card:active{opacity:.7}
.avatar{
  width:46px;height:46px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
  border:1px solid var(--border);
}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:12px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{text-align:right;flex-shrink:0}
.card-sum{font-size:13px;font-weight:600;color:var(--accent)}
.card-rating{font-size:12px;color:var(--ink2);margin-top:2px}
.tag{
  display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-top:4px;
  background:var(--bg3);border:1px solid var(--border);color:var(--ink2);
}
.tag.t-coop{border-color:#5ec27a55;color:var(--good)}
.tag.t-supp{border-color:#e8c96d55;color:var(--accent)}

/* ── Detail overlay ── */
#detail{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
#detail.open{transform:translateX(0)}

.det-hero{padding:24px 16px 16px;display:flex;gap:14px;align-items:flex-start}
.det-avatar{
  width:64px;height:64px;border-radius:50%;background:var(--bg3);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  border:2px solid var(--accent);
}
.det-name{font-size:19px;font-weight:700;line-height:1.2}
.det-kind{font-size:13px;color:var(--ink2);margin-top:4px}
.det-city{font-size:13px;color:var(--ink3);margin-top:2px}

/* ── Stats row ── */
.stats-row{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-box{
  flex:1;min-width:80px;background:var(--bg2);border-radius:10px;padding:10px 12px;
  border:1px solid var(--border);text-align:center;
}
.stat-val{font-size:16px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--ink3);margin-top:2px}

/* ── Action buttons ── */
.actions{display:flex;gap:10px;padding:0 16px 16px}
.btn{
  flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity .15s;
}
.btn:active{opacity:.75}
.btn-call{background:var(--good);color:#fff}
.btn-tg{background:#2AABEE;color:#fff}
.btn-wa{background:#25D366;color:#fff}

/* ── Info section ── */
.section-title{padding:4px 16px 8px;font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px}
.info-card{margin:0 16px 12px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.info-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)}
.info-row:last-child{border:none}
.info-label{width:100px;font-size:13px;color:var(--ink3);flex-shrink:0}
.info-value{font-size:13px;color:var(--ink);word-break:break-all}

/* ── History ── */
.hist-item{
  margin:0 16px 8px;background:var(--bg2);border-radius:10px;
  border:1px solid var(--border);padding:10px 14px;
}
.hist-date{font-size:12px;color:var(--ink3)}
.hist-desc{font-size:13px;margin:3px 0}
.hist-sum{font-size:14px;font-weight:700;color:var(--accent)}

/* ── Spinner ── */
.spinner-wrap{display:flex;justify-content:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty-ico{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ LIST VIEW ═══ -->
  <div class="hdr">
    <h1>⚙ METALLBOT</h1>
    <small id="hdr-sub">Загрузка...</small>
  </div>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="🔍 Поиск контрагента..." autocomplete="off">
  </div>
  <div class="filters">
    <span class="chip active" data-kind="">Все</span>
    <span class="chip" data-kind="coop">Кооператоры</span>
    <span class="chip" data-kind="supplier">Поставщики</span>
  </div>
  <div id="list"></div>

  <!-- ═══ DETAIL VIEW ═══ -->
  <div id="detail"></div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let allContacts = [];
let activeKind = '';
let searchQ = '';

// ── Load contacts ──────────────────────────────────────────────────────────
async function loadContacts() {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  try {
    const r = await fetch('/api/contacts');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    // API returns {items: [...], total: N}
    allContacts = Array.isArray(data) ? data : (data.items || []);
    document.getElementById('hdr-sub').textContent = allContacts.length + ' контрагентов';
    render();
  } catch (e) {
    listEl.innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div>Ошибка: ${e.message || e}<br><small style="color:#555;font-size:11px;word-break:break-all">${window.location.origin}/api/contacts</small></div>`;
    console.error(e);
  }
}

// ── Render list ────────────────────────────────────────────────────────────
function render() {
  const q = searchQ.toLowerCase();
  const filtered = allContacts.filter(c => {
    const matchKind = !activeKind || (c.kind || '') === activeKind;
    const matchQ = !q ||
      (c.name || '').toLowerCase().includes(q) ||
      (c.city || '').toLowerCase().includes(q) ||
      (c.tags || []).some(t => t.toLowerCase().includes(q));
    return matchKind && matchQ;
  });

  const listEl = document.getElementById('list');
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div>Ничего не найдено</div>';
    return;
  }

  const kindIcon = { 'coop': '🤝', 'supplier': '🏭' };
  const kindLabel = { 'coop': 'Кооператор', 'supplier': 'Поставщик' };
  const tagClass  = { 'coop': 't-coop', 'supplier': 't-supp' };

  listEl.innerHTML = filtered.map(c => {
    const icon = kindIcon[c.kind] || '👤';
    // Build sub-tags from specialization/service fields
    const tagSrcs = [c.specialization, c.service].filter(Boolean);
    const tagsHtml = tagSrcs.slice(0,2).map(t =>
      `<span class="tag ${tagClass[c.kind]||''}">${esc(t.slice(0,20))}</span>`).join(' ');
    const rating = parseFloat(c.rating) || 0;
    const stars = rating ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating)) : '';
    const kindName = kindLabel[c.kind] || c.kind || '';
    return `
      <div class="card" onclick="openDetail('${esc(encodeURIComponent(c.name))}')">
        <div class="avatar">${icon}</div>
        <div class="card-body">
          <div class="card-name">${esc(c.name)}</div>
          <div class="card-sub">${esc(c.city || kindName)}</div>
          ${tagsHtml}
        </div>
        <div class="card-right">
          ${stars ? `<div class="card-rating" style="color:var(--warn);font-size:11px">${stars}</div>` : ''}
          ${kindName ? `<div style="font-size:11px;color:var(--ink3);margin-top:3px">${esc(kindName)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── Open detail ────────────────────────────────────────────────────────────
async function openDetail(encId) {
  const det = document.getElementById('detail');
  det.innerHTML = '<div class="spinner-wrap" style="padding-top:40vh"><div class="spinner"></div></div>';
  det.classList.add('open');
  if (tg) { tg.BackButton.show(); tg.BackButton.onClick(closeDetail); }

  try {
    const r = await fetch('/api/contact/' + encId);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const c = await r.json();
    renderDetail(c);
  } catch (e) {
    det.innerHTML = '<div class="empty" style="padding-top:30vh"><div class="empty-ico">⚠️</div>Ошибка загрузки</div>';
  }
}

// ── Render detail ──────────────────────────────────────────────────────────
function renderDetail(c) {
  const kindIcon  = { 'coop': '🤝', 'supplier': '🏭' };
  const kindLabel = { 'coop': 'Кооператор', 'supplier': 'Поставщик' };
  const icon  = kindIcon[c.kind] || '👤';
  const kname = kindLabel[c.kind] || c.kind || '';

  const rating = parseFloat(c.rating) || 0;
  const stars  = rating ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating)) : '—';

  const phone = c.phone || '';
  // Stats come under c.stats
  const stats = c.stats || {};

  const actionBtns = [
    phone ? `<button class="btn btn-call" onclick="window.open('tel:${esc(phone)}')">📞 Позвонить</button>` : '',
  ].filter(Boolean).join('');

  const infoFields = [
    ['Тип',           kname],
    ['Город',         c.city],
    ['Телефон',       phone],
    ['Email',         c.email],
    ['Контакт',       c.contact],
    ['Специализация', c.specialization],
    ['Услуги',        c.service],
    ['Материалы',     c.materials],
    ['Оборудование',  c.equipment],
    ['Статус',        c.status],
    ['Уровень цен',   c.price_level],
    ['Примечание',    c.notes],
    ['Добавлено',     c.added],
  ].filter(([,v]) => v).map(([l, v]) =>
    `<div class="info-row"><span class="info-label">${esc(l)}</span><span class="info-value">${esc(v)}</span></div>`
  ).join('');

  // API returns c.history (not c.purchases)
  const history = c.history || [];
  const histHtml = history.length
    ? history.map(h => `
        <div class="hist-item">
          <div class="hist-date">${esc(h.date || '')}${h.invoice ? ' · №' + esc(h.invoice) : ''}</div>
          <div class="hist-desc">${esc(h.name || '')}${h.mark ? ' ' + esc(h.mark) : ''}${h.size ? ' ' + esc(h.size) : ''}</div>
          ${h.qty ? `<div style="font-size:12px;color:var(--ink2)">${esc(h.qty)} ${esc(h.unit||'')}</div>` : ''}
          ${h.sum ? `<div class="hist-sum">${esc(h.sum)} ₽</div>` : ''}
        </div>`).join('')
    : '<div class="empty" style="padding:20px"><div class="empty-ico" style="font-size:32px">📋</div>История пуста</div>';

  document.getElementById('detail').innerHTML = `
    <div style="padding-top:env(safe-area-inset-top)">
      <!-- Hero -->
      <div class="det-hero">
        <div class="det-avatar">${icon}</div>
        <div>
          <div class="det-name">${esc(c.name)}</div>
          <div class="det-kind">${esc(kname)}</div>
          <div class="det-city">${esc(c.city || '')}</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" style="color:var(--warn);font-size:13px">${stars}</div>
          <div class="stat-lbl">Рейтинг</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${stats.purchases_count ?? '—'}</div>
          <div class="stat-lbl">Закупок</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${stats.total_sum ? fmtSum(stats.total_sum) : '—'}</div>
          <div class="stat-lbl">Оборот</div>
        </div>
      </div>

      <!-- Actions -->
      ${actionBtns ? `<div class="actions">${actionBtns}</div>` : ''}

      <!-- Info -->
      ${infoFields ? `<div class="section-title">Информация</div><div class="info-card">${infoFields}</div>` : ''}

      <!-- History -->
      <div class="section-title">История закупок</div>
      ${histHtml}
      <div style="height:32px"></div>
    </div>`;
}

// ── Close detail ───────────────────────────────────────────────────────────
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  if (tg) tg.BackButton.hide();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
function fmtSum(n) {
  n = Number(n);
  if (n >= 1e6) return (n/1e6).toFixed(2) + ' млн ₽';
  if (n >= 1e3) return (n/1e3).toFixed(1) + ' тыс ₽';
  return n + ' ₽';
}

// ── Events ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(ch => {
  ch.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    ch.classList.add('active');
    activeKind = ch.dataset.kind;
    render();
  });
});
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// ── Boot ───────────────────────────────────────────────────────────────────
loadContacts();
</script>
</body>
</html>
