<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METALLBOT — История документов</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/nav.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1A1428;
  --card:    #221C34;
  --border:  #3A3058;
  --accent:  #C8124E;
  --gold:    #FFB040;
  --text:    #E8E0F4;
  --muted:   #9286ac;
  --green:   #28C76F;
  --blue:    #4EA8DE;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Onest',Arial,sans-serif; min-height:100vh;
}

/* ── Шапка ── */
header {
  background:#150F22; border-bottom:1px solid var(--border);
  padding:14px 20px; display:flex; align-items:center; gap:14px;
}
header h1 { font-size:18px; font-weight:700; color:var(--text); }
header .sub { font-size:16px; color:var(--muted); }
.nav-links { margin-left:auto; display:flex; gap:10px; }
.nav-links a {
  color:var(--muted); font-size:17px; text-decoration:none;
  padding:5px 12px; border:1px solid var(--border); border-radius:14px;
  transition:color .15s, border-color .15s;
}
.nav-links a:hover, .nav-links a.active {
  color:var(--gold); border-color:var(--gold);
}

/* ── Поиск ── */
.toolbar {
  padding:14px 20px; display:flex; gap:10px; align-items:center;
  border-bottom:1px solid var(--border);
}
#search {
  flex:1; background:#2A2040; border:1px solid var(--border);
  border-radius:8px; padding:8px 14px; color:var(--text);
  font-size:17px; outline:none;
}
#search:focus { border-color:var(--gold); }
#count { font-size:17px; color:var(--muted); white-space:nowrap; }

/* ── Сетка карточек ── */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:16px; padding:20px;
}

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; overflow:hidden;
  display:flex; flex-direction:column;
  transition:border-color .15s, transform .12s;
}
.card:hover { border-color:var(--gold); transform:translateY(-2px); }

/* 3D-превью внутри карточки */
.preview-wrap {
  position:relative; height:160px; background:#0E0A1C;
  cursor:pointer; overflow:hidden;
}
.preview-wrap iframe {
  width:100%; height:100%; border:none;
  pointer-events:none;   /* клики на карточку, не на iframe */
  opacity:0; transition:opacity .4s;
}
.preview-wrap iframe.loaded { opacity:1; }
.preview-placeholder {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:6px;
  color:var(--muted); font-size:17px;
}
.preview-placeholder svg { opacity:.35; }
.preview-wrap.expanded { height:380px; }
.preview-wrap.expanded iframe { pointer-events:auto; }

/* Контент карточки */
.card-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:10px; }
.card-name { font-size:17px; font-weight:700; color:var(--text); line-height:1.3; }
.card-meta { font-size:16px; color:var(--muted); }
.card-date { font-size:16px; color:var(--muted); }

/* Кнопки */
.card-btns { display:flex; flex-wrap:wrap; gap:7px; margin-top:auto; }
.btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:7px; border:none; cursor:pointer;
  font-size:16px; font-weight:600; text-decoration:none;
  transition:opacity .15s, transform .1s;
}
.btn:hover { opacity:.85; transform:scale(1.04); }
.btn:active { transform:scale(.97); }
.btn-kp   { background:#1E3A5A; color:#4EA8DE; }
.btn-mk   { background:#1E3A1E; color:#28C76F; }
.btn-calc { background:#2E2040; color:var(--gold); }
.btn-3d   { background:#3A1828; color:var(--accent); }
.btn-3d-exp {
  background:transparent; color:var(--muted); border:1px solid var(--border);
  margin-left:auto;
}
.btn-3d-exp.on { color:var(--gold); border-color:var(--gold); }

/* Пустое состояние */
.empty {
  grid-column:1/-1; text-align:center; padding:60px 20px;
  color:var(--muted);
}
.empty h2 { font-size:18px; margin-bottom:8px; }

/* Скелетон */
.skeleton {
  background:linear-gradient(90deg,#221C34 25%,#2E2648 50%,#221C34 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer { to { background-position:-200% 0; } }
.sk-card { height:260px; }

/* Toast */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#28C76F; color:#fff; padding:9px 22px; border-radius:20px;
  font-size:17px; font-weight:600; opacity:0; pointer-events:none;
  transition:opacity .25s;
}
</style>
</head>
<body>

<header>
  <div>
    <div class="company" style="font-size:15px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase">
      ООО «Механические Технологии»
    </div>
    <h1>📂 История документов</h1>
  </div>
  <nav class="nav-links">
    <a href="/">Кооперация</a>
    <a href="/calc.html">Калькулятор</a>
    <a href="/tolerances.html">Допуски</a>
    <a href="/docs.html" class="active">Документы</a>
  </nav>
</header>

<div class="toolbar">
  <input id="search" type="text" placeholder="🔍 Поиск по названию детали…" oninput="filterCards()">
  <span id="count"></span>
</div>

<div class="grid" id="grid">
  <!-- skeleton -->
  <div class="skeleton sk-card"></div>
  <div class="skeleton sk-card"></div>
  <div class="skeleton sk-card"></div>
</div>

<div id="toast"></div>

<script>
var allCards = [];

function fmt_date(ts) {
  if (!ts) return "";
  var d = new Date(ts * 1000);
  return d.toLocaleDateString("ru-RU", {day:"2-digit",month:"2-digit",year:"numeric"});
}

function pretty_name(folder) {
  // "Вт_качалки_торм" → "Вт качалки торм"
  return folder.replace(/_/g," ");
}

function render(items) {
  var grid = document.getElementById("grid");
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><h2>Документов пока нет</h2><p>Сгенерируйте первый документ через бот: /kp или /mk</p></div>';
    return;
  }
  grid.innerHTML = "";
  items.forEach(function(item, idx) {
    var card  = document.createElement("div");
    card.className = "card";
    card.dataset.name = (item.folder || "").toLowerCase();

    var previewHtml = "";
    if (item.has_3d) {
      var src3d = "/api/docs/" + encodeURIComponent(item.folder) + "/" + encodeURIComponent(item.files["3d"]);
      previewHtml = '<div class="preview-wrap" id="pw'+idx+'" onclick="toggle3d(this,\''+src3d+'\')">'
        + '<div class="preview-placeholder">'
        + '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'
        + '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'
        + '<span>▶ 3D-превью</span></div></div>';
    }

    var btns = "";
    if (item.has_kp) {
      var kpHref = "/api/docs/"+encodeURIComponent(item.folder)+"/"+encodeURIComponent(item.files["kp"]);
      btns += '<a class="btn btn-kp" href="'+kpHref+'" download>📋 КП</a>';
    }
    if (item.has_mk) {
      var mkHref = "/api/docs/"+encodeURIComponent(item.folder)+"/"+encodeURIComponent(item.files["mk"]);
      btns += '<a class="btn btn-mk" href="'+mkHref+'" download>🗂 МК</a>';
    }
    if (item.files && item.files["calc"]) {
      var cHref = "/api/docs/"+encodeURIComponent(item.folder)+"/"+encodeURIComponent(item.files["calc"]);
      btns += '<a class="btn btn-calc" href="'+cHref+'" download>📊 Расчёт</a>';
    }
    if (item.has_3d) {
      btns += '<button class="btn btn-3d" onclick="toggle3d(document.getElementById(\'pw'+idx+'\'),\'/api/docs/'+encodeURIComponent(item.folder)+'/'+encodeURIComponent(item.files['3d'])+'\')">🎯 3D</button>';
    }

    card.innerHTML = previewHtml
      + '<div class="card-body">'
      + '<div class="card-name">' + pretty_name(item.folder) + '</div>'
      + '<div class="card-date">🕐 ' + fmt_date(item.mtime) + '</div>'
      + '<div class="card-btns">' + btns + '</div>'
      + '</div>';

    grid.appendChild(card);
    allCards.push(card);
  });
  document.getElementById("count").textContent = items.length + " дет.";
}

function toggle3d(wrap, src) {
  if (wrap.classList.contains("expanded")) {
    wrap.classList.remove("expanded");
    wrap.innerHTML = wrap.innerHTML; // reset
    return;
  }
  wrap.classList.add("expanded");
  // Убираем placeholder, вставляем iframe
  wrap.innerHTML = '<iframe src="' + src + '" allow="fullscreen" onload="this.classList.add(\'loaded\')"></iframe>';
}

function filterCards() {
  var q = document.getElementById("search").value.toLowerCase().trim();
  var vis = 0;
  allCards.forEach(function(c) {
    var show = !q || c.dataset.name.includes(q);
    c.style.display = show ? "" : "none";
    if (show) vis++;
  });
  document.getElementById("count").textContent = vis + " дет.";
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(function(){ t.style.opacity = 0; }, 2200);
}

// Загрузка
fetch("/api/docs")
  .then(function(r){ return r.json(); })
  .then(function(data){ render(data); })
  .catch(function(e){ render([]); });
</script>
</body>
</html>
